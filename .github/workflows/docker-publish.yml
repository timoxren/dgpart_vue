name: Docker Build and Publish

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  # Имя репозитория будет установлено в шаге ниже

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    # --- ШАГ 1: Объявляем, что у этого задания будут выходные данные ---
    outputs:
      image_name: ${{ steps.set_name.outputs.image_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- ШАГ 2: Добавляем 'id' к шагу и используем $GITHUB_OUTPUT ---
      - name: Set image name to lowercase
        id: set_name # Даем шагу уникальный ID
        run: echo "image_name=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            # Используем выходные данные шага 'set_name'
            ${{ env.REGISTRY }}/${{ steps.set_name.outputs.image_name }}:latest
            ${{ env.REGISTRY }}/${{ steps.set_name.outputs.image_name }}:${{ github.sha }}

  deploy:
    needs: build-and-push # Зависимость от предыдущего задания
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # --- ШАГ 3: Используем 'needs' для получения выходных данных ---
            # Получаем имя образа из outputs предыдущего задания
            IMAGE_NAME_FROM_BUILD="${{ needs.build-and-push.outputs.image_name }}"
            
            CONTAINER_NAME="dgpart_vue"
            DOCKER_PORT_MAPPING="9700:80"
            WEB_ROOT_CONTAINER_PUBLIC="/app/public"
            DOCKER_REPO_FULL="${{ env.REGISTRY }}/${IMAGE_NAME_FROM_BUILD}"

            echo "Deploying image: ${DOCKER_REPO_FULL}:latest"

            docker pull ${DOCKER_REPO_FULL}:latest
            docker stop ${CONTAINER_NAME} || true
            docker rm ${CONTAINER_NAME} || true

            docker run -d \
              -p ${DOCKER_PORT_MAPPING} \
              -v "${{ secrets.STATIC_DIR_HOST }}:${WEB_ROOT_CONTAINER_PUBLIC}" \
              --name ${CONTAINER_NAME} \
              ${DOCKER_REPO_FULL}:latest

            echo "Deployment successful!"