stages:
  - deploy

deploy:
  stage: deploy
  image: debian:bullseye
  script:
    # Устанавливаем SSH ключ для подключения к серверу
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
    # Копируем файлы на сервер через rsync
    - rsync -avz --delete ./ $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH
  only:
    - master # Выполняем только при пуше в основную ветку